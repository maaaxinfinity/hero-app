name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for manual runs, e.g. v0.1.0)"
        required: true
        default: "v0.0.0-dev"

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      # ubuntu-latest ships the Android SDK (ANDROID_HOME set, licenses accepted).
      # Signing secrets come from repo secrets, never the tree. Set:
      #   KEYSTORE_BASE64  = base64 of the release keystore (.jks)
      #   KEYSTORE_PASSWORD / KEY_ALIAS / KEY_PASSWORD
      # Without them assembleRelease FAILS CLOSED (the Gradle config refuses to
      # debug-sign a release), so a secret-less or misconfigured run can never
      # publish an unupgradable debug-signed APK. A fork that just wants a local
      # build should use assembleDebug (or -PallowDebugSigningForRelease).
      - name: Materialize keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > composeApp/keystore.jks
      - name: Build signed APK
        env:
          KEYSTORE_FILE: keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew :composeApp:assembleRelease --no-daemon
      # Artifact-level gate (defense in depth on top of the Gradle fail-closed
      # signing config): prove the built APK is release-signed, not debug-signed.
      # A debug-signed APK carries the well-known Android debug certificate DN;
      # its different certificate means users can't upgrade over a real install,
      # so refuse to publish it.
      - name: Verify the APK is release-signed (not debug)
        run: |
          apk=composeApp/build/outputs/apk/release/composeApp-release.apk
          apksigner=$(ls "$ANDROID_HOME"/build-tools/*/apksigner 2>/dev/null | sort -V | tail -1)
          if [ -z "$apksigner" ]; then echo "::error::apksigner not found in Android SDK"; exit 1; fi
          echo "using $apksigner"
          certs=$("$apksigner" verify --print-certs "$apk")
          echo "$certs"
          if printf '%s' "$certs" | grep -q "CN=Android Debug"; then
            echo "::error::release APK is debug-signed — refusing to publish"
            exit 1
          fi
      - name: Name the artifact
        run: cp composeApp/build/outputs/apk/release/composeApp-release.apk hero-app.apk
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: hero-app.apk

  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
          - os: macos-latest
            label: macos
          - os: windows-latest
            label: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Build desktop uber jar
        shell: bash
        run: |
          chmod +x gradlew || true
          ./gradlew :composeApp:packageReleaseUberJarForCurrentOS --no-daemon
      - name: Name the artifact per-OS
        shell: bash
        run: |
          jar=$(ls composeApp/build/compose/jars/*.jar | head -1)
          cp "$jar" "hero-app-${{ matrix.label }}.jar"
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.label }}
          path: hero-app-${{ matrix.label }}.jar

  release:
    needs: [android, desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: List artifacts
        run: ls -R dist
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          gh release create "$TAG" dist/* \
            --repo "${{ github.repository }}" \
            --title "$TAG" \
            --generate-notes
