name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for manual runs, e.g. v0.1.0)"
        required: true
        default: "v0.0.0-dev"

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      # ubuntu-latest ships the Android SDK (ANDROID_HOME set, licenses accepted).
      - name: Build signed APK
        run: |
          chmod +x gradlew
          ./gradlew :composeApp:assembleRelease --no-daemon
      - name: Name the artifact
        run: cp composeApp/build/outputs/apk/release/composeApp-release.apk hero-app.apk
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: hero-app.apk

  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
          - os: macos-latest
            label: macos
          - os: windows-latest
            label: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Build desktop uber jar
        shell: bash
        run: |
          chmod +x gradlew || true
          ./gradlew :composeApp:packageReleaseUberJarForCurrentOS --no-daemon
      - name: Name the artifact per-OS
        shell: bash
        run: |
          jar=$(ls composeApp/build/compose/jars/*.jar | head -1)
          cp "$jar" "hero-app-${{ matrix.label }}.jar"
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.label }}
          path: hero-app-${{ matrix.label }}.jar

  release:
    needs: [android, desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: List artifacts
        run: ls -R dist
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          gh release create "$TAG" dist/* \
            --repo "${{ github.repository }}" \
            --title "$TAG" \
            --generate-notes
